name: ci

# Mirrors the GitLab CI pipeline (.gitlab-ci.yml) for when GitHub CI is in use.
# Stages map roughly to: lint -> test -> build -> visual.
#
# @stuartclark/ui is consumed as link:../../ui (workspace sibling), so it is
# cloned + built one level above the checkout (matching the GitLab .setup template).
# Set UI_REPO_URL (repo variable) to the ui repo URL on this GitHub instance
# once GitHub is the primary remote.

on:
  push:
    branches: [main, develop, feat/nuxt4]
  pull_request:
    branches: [main, develop, feat/nuxt4]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NODE_VERSION: "22"
  PNPM_VERSION: "10"
  UI_REPO_URL: "https://x-access-token:${{ secrets.UI_REPO_TOKEN }}@github.com/Decipher/sc-ui.git"

jobs:
  build:
    name: lint + test + typecheck + build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout stuar.tc
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: nuxt/pnpm-lock.yaml

      - name: Clone + build @stuartclark/ui sibling
        run: |
          git clone "${{ env.UI_REPO_URL }}" "$GITHUB_WORKSPACE/../ui"
          cd "$GITHUB_WORKSPACE/../ui"
          pnpm install --frozen-lockfile
          pnpm prepare

      - name: Install nuxt deps
        run: pnpm --dir nuxt install --frozen-lockfile

      - name: Lint
        run: |
          pnpm --dir nuxt lint
          pnpm --dir nuxt lint:style
          pnpm --dir nuxt lint:md
          pnpm --dir nuxt lint:spell
          pnpm --dir nuxt lint:knip

      - name: Typecheck
        run: pnpm --dir nuxt typecheck

      - name: Test (Vitest, 100% coverage)
        run: pnpm --dir nuxt test

      - name: Build (static generate)
        run: pnpm --dir nuxt generate

      - name: Upload generated site
        uses: actions/upload-artifact@v4
        with:
          name: site
          path: nuxt/dist
          retention-days: 1

  seo:
    name: SEO metadata (Playwright)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout stuar.tc
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: nuxt/pnpm-lock.yaml

      - name: Clone + build @stuartclark/ui sibling
        run: |
          git clone "${{ env.UI_REPO_URL }}" "$GITHUB_WORKSPACE/../ui"
          cd "$GITHUB_WORKSPACE/../ui"
          pnpm install --frozen-lockfile
          pnpm prepare

      - name: Install nuxt deps
        run: pnpm --dir nuxt install --frozen-lockfile

      - name: Download generated site
        uses: actions/download-artifact@v4
        with:
          name: site
          path: nuxt/dist

      - name: Install Playwright Chromium
        run: pnpm --dir nuxt exec playwright install --with-deps chromium

      - name: Run SEO suite
        run: pnpm --dir nuxt exec playwright test --project=seo

  drupal:
    name: Drupal lint + test
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout 🛎
        uses: actions/checkout@v6

      - name: Cache Composer dependencies 📦
        uses: actions/cache@v5
        with:
          path: drupal/vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('drupal/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Setup DDEV
        uses: ddev/github-action-setup-ddev@v1
        with:
          ddevDir: drupal
          autostart: false

      - name: Start DDEV
        run: ddev start
        working-directory: drupal

      - name: Install Composer dependencies 👨🏻‍💻
        run: cd drupal && ddev composer install

      - name: Run Drupal PHPCS linting 🔎
        run: cd drupal && ddev phpcs

      - name: Run Drupal PHPStan analysis 🔎
        run: cd drupal && ddev phpstan

      - name: Install Drupal 👨🏻‍💻
        run: cd drupal && ddev install

      - name: Run Drupal PHPUnit tests 🧪
        run: cd drupal && ddev phpunit
