allowBuilds:
  '@parcel/watcher': true
  '@stuartclark/ui': true
  better-sqlite3: true
  esbuild: true
  unrs-resolver: true
  vue-demi: true
minimumReleaseAge: 0
# druxt and druxt-schema both resolve from the same druxt/druxt.js commit
# tarball (different `path:` subdirectories) — pnpm also keeps an
# unscoped/root bookkeeping store entry for that shared source tarball
# alongside the two correctly path-scoped ones actually used to build
# node_modules, and a first-time concurrent install across parallel CI jobs
# can write that shared entry inconsistently. Doesn't affect what actually
# gets installed (verified locally: the path-scoped entries are separate
# store slots) — just the verification pnpm does against the unscoped one.
strictStorePkgContentCheck: false

overrides:
  esbuild: ^0.28.1
  markdown-it: ^14.3.0
  markdownlint-cli2>js-yaml: ^4.3.0
  druxt: github:druxt/druxt.js#feature/337-nuxt3&path:packages/druxt
  # @nuxtjs/axios (a druxt dependency, unused since druxt.patch drops axios
  # in favour of fetch) drags in defu@5.0.1 and consola@2.15.3, both
  # CJS-only builds (default export only) that clash with the newer
  # named-export versions (defu@6.1.7, consola@3.4.2) the rest of the tree
  # — Nitro included — expects. Force one version of each everywhere.
  defu: ^6.1.7
  consola: ^3.4.2
patchedDependencies:
  nuxt-cloudflared-tunnel: patches/nuxt-cloudflared-tunnel.patch
  druxt: patches/druxt.patch
  druxt-schema: patches/druxt-schema.patch
